services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reservations}
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devops}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devops} -d ${POSTGRES_DB:-reservations}"]
      interval: 5s
      timeout: 5s
      retries: 10

  reservation-service:
    build:
      context: .
      dockerfile: backend/reservation_service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://devops:devops@postgres:5432/reservations}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8001}
      DEMO_SEED_ENABLED: ${DEMO_SEED_ENABLED:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: backend/notification_service/Dockerfile
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - reservation-service

volumes:
  postgres-data:
